name: Enforce AI Code Review

on:
  workflow_run:
    workflows: [".NET Code Review Agent"]
    types:
      - completed

permissions:
  actions: read
  contents: read
  pull-requests: write

jobs:
  enforce:
    # Only enforce when the triggering workflow ran for a PR
    # and completed successfully
    if: >
      github.event.workflow_run.event == 'pull_request' &&
      github.event.workflow_run.conclusion == 'success'

    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install GitHub CLI and jq
        run: |
          sudo apt update
          sudo apt install gh jq -y

      - name: Authenticate GitHub CLI
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh auth status

      - name: Download agent artifacts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RUN_ID=${{ github.event.workflow_run.id }}
          echo "Downloading artifacts from run $RUN_ID"

          mkdir artifacts
          cd artifacts

          gh run download $RUN_ID || true

      - name: Extract AI review report
        id: extract
        run: |
          RUN_ID=${{ github.event.workflow_run.id }}

          echo "Looking for AI report with RUN_ID: $RUN_ID"

          FILE=$(grep -rl "AI CODE REVIEW FINAL REPORT RUN_ID:$RUN_ID" artifacts || true)

          if [ -z "$FILE" ]; then
            echo "No AI report found."
            exit 1
          fi

          awk "/FINAL REPORT RUN_ID:$RUN_ID/,/END RUN_ID:$RUN_ID/" "$FILE" > review.txt

          echo "Extracted report:"
          cat review.txt

      - name: Get PR number
        id: pr
        run: |
          PR_NUMBER=$(jq -r '.workflow_run.pull_requests[0].number // empty' "$GITHUB_EVENT_PATH")
          echo "pr=$PR_NUMBER" >> $GITHUB_OUTPUT

      - name: Comment report on PR
        if: steps.pr.outputs.pr != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Posting AI review comment to PR #${{ steps.pr.outputs.pr }}"

          echo "## 🤖 AI Code Review Result" > comment.md
          echo "" >> comment.md
          echo '```' >> comment.md
          cat review.txt >> comment.md
          echo '```' >> comment.md

          gh pr comment ${{ steps.pr.outputs.pr }} --body-file comment.md

      - name: Fail if AI review failed
        run: |
          if grep -q "AI_CODE_REVIEW_STATUS: FAIL" review.txt; then
            echo "❌ AI code review failed"
            exit 1
          else
            echo "✅ AI code review passed"
          fi