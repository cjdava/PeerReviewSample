name: Enforce AI Code Review

on:
  workflow_run:
    workflows: [".NET Code Review Agent"]
    types:
      - completed

permissions:
  actions: read
  contents: read
  pull-requests: write

jobs:
  enforce:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install GitHub CLI
        run: |
          sudo apt update
          sudo apt install gh -y

      - name: Authenticate GitHub CLI
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh auth status

      - name: Download AI agent logs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Downloading logs from workflow run ${{ github.event.workflow_run.id }}"
          gh run download ${{ github.event.workflow_run.id }} -n agent_outputs || true

      - name: Extract AI review report
        id: extract_report
        run: |
          echo "Extracting AI review report..."

          REPORT_FILE=$(grep -rl "AI CODE REVIEW REPORT START" agent_outputs | head -n 1)

          if [ -z "$REPORT_FILE" ]; then
            echo "No AI review report found."
            echo "report=No report generated by AI reviewer." >> $GITHUB_OUTPUT
          else
            awk '/AI CODE REVIEW REPORT START/,/AI CODE REVIEW REPORT END/' "$REPORT_FILE" > review.txt
            echo "report<<EOF" >> $GITHUB_OUTPUT
            cat review.txt >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          fi

      - name: Comment AI review on PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER=${{ github.event.workflow_run.pull_requests[0].number }}

          if [ -n "$PR_NUMBER" ]; then
            echo "Posting AI review comment to PR #$PR_NUMBER"

            echo "## 🤖 AI Code Review" > comment.md
            echo "" >> comment.md
            echo "${{ steps.extract_report.outputs.report }}" >> comment.md

            gh pr comment "$PR_NUMBER" --body-file comment.md
          else
            echo "No PR associated with this workflow run."
          fi

      - name: Fail if review failed
        run: |
          echo "Checking AI review status..."

          if grep -R "AI_CODE_REVIEW_STATUS: FAIL" agent_outputs; then
            echo "❌ Code review failed"
            exit 1
          else
            echo "✅ Code review passed"
          fi