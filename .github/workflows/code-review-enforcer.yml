name: Enforce AI Code Review

on:
  workflow_run:
    workflows: [".NET Code Review Agent"]
    types:
      - completed

permissions:
  actions: read
  contents: read
  pull-requests: write
  checks: write
  statuses: writes

jobs:
  enforce:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install GitHub CLI and jq
        run: |
          sudo apt update
          sudo apt install gh jq -y

      - name: Authenticate GitHub CLI
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh auth status

      - name: Download agent artifacts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Downloading artifacts from run ${{ github.event.workflow_run.id }}"
          gh run download ${{ github.event.workflow_run.id }} || true

      - name: Extract AI review report for this workflow run
        id: extract
        run: |
          RUN_ID=${{ github.event.workflow_run.id }}

          echo "Looking for report with RUN_ID: $RUN_ID"

          FILE=$(grep -rl "AI CODE REVIEW FINAL REPORT RUN_ID:$RUN_ID" . | head -n 1)

          if [ -z "$FILE" ]; then
            echo "No matching AI report found."
            exit 1
          fi

          awk "/FINAL REPORT RUN_ID:$RUN_ID/,/END RUN_ID:$RUN_ID/" "$FILE" > review.txt

          echo "Extracted report:"
          cat review.txt

      - name: Determine review result
        id: result
        run: |
          if grep -q "AI_CODE_REVIEW_STATUS: FAIL" review.txt; then
            echo "status=failure" >> $GITHUB_OUTPUT
          else
            echo "status=success" >> $GITHUB_OUTPUT
          fi

      - name: Get PR number
        id: pr
        run: |
          PR_NUMBER=$(jq -r '.workflow_run.pull_requests[0].number // empty' "$GITHUB_EVENT_PATH")
          echo "pr=$PR_NUMBER" >> $GITHUB_OUTPUT

      - name: Comment report on PR
        if: steps.pr.outputs.pr != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr comment ${{ steps.pr.outputs.pr }} --body-file review.txt

      # - name: Publish AI Code Review Status
      #   uses: actions/github-script@v7
      #   with:
      #     github-token: ${{ secrets.GITHUB_TOKEN }}
      #     script: |
      #       const fs = require('fs');

      #       const report = fs.readFileSync('review.txt','utf8');
      #       const failed = report.includes("AI_CODE_REVIEW_STATUS: FAIL");

      #       const state = failed ? "failure" : "success";

      #       await github.rest.repos.createCommitStatus({
      #         owner: context.repo.owner,
      #         repo: context.repo.repo,
      #         sha: context.payload.workflow_run.head_sha,
      #         state: state,
      #         context: "AI Code Review",
      #         description: failed
      #           ? "AI review detected blocking issues"
      #           : "AI review passed",
      #         target_url: context.payload.workflow_run.html_url
      #       });

      - name: Fail workflow if review failed
        if: steps.result.outputs.status == 'failure'
        run: |
          echo "❌ AI code review failed"
          exit 1