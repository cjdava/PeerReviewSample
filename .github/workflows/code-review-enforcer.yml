name: Enforce AI Code Review

on:
  workflow_run:
    workflows: [".NET Code Review Agent"]
    types:
      - completed

permissions:
  actions: read
  contents: read
  pull-requests: write
  checks: write

jobs:
  enforce:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install GitHub CLI and jq
        run: |
          sudo apt update
          sudo apt install gh jq -y

      - name: Authenticate GitHub CLI
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh auth status

      - name: Download agent artifacts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Downloading artifacts from run ${{ github.event.workflow_run.id }}"
          gh run download ${{ github.event.workflow_run.id }} || true

      - name: Extract AI review report for this workflow run
        id: extract
        run: |
          RUN_ID=${{ github.event.workflow_run.id }}

          echo "Looking for report with RUN_ID: $RUN_ID"

          FILE=$(grep -rl "AI CODE REVIEW FINAL REPORT RUN_ID:$RUN_ID" . | head -n 1)

          if [ -z "$FILE" ]; then
            echo "No matching AI report found."
            exit 1
          fi

          awk "/FINAL REPORT RUN_ID:$RUN_ID/,/END RUN_ID:$RUN_ID/" "$FILE" > review.txt

          echo "Extracted report:"
          cat review.txt

      - name: Get PR number
        id: pr
        run: |
          PR_NUMBER=$(jq -r '.workflow_run.pull_requests[0].number // empty' "$GITHUB_EVENT_PATH")
          echo "pr=$PR_NUMBER" >> $GITHUB_OUTPUT

      - name: Comment report on PR
        if: steps.pr.outputs.pr != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # echo "## 🤖 AI Code Review Result" > comment.md
          # echo "" >> comment.md
          # echo '```' >> comment.md
          # cat review.txt >> comment.md
          # echo '```' >> comment.md

          gh pr comment ${{ steps.pr.outputs.pr }} --body-file review.txt

      # - name: Convert findings to annotations
      #   run: |
      #     echo "[]" > annotations.json

      #     awk '
      #     /Rule:/ {rule=$0}
      #     /File:/ {file=$2}
      #     /Line:/ {line=$2}
      #     /Description:/ {
      #       desc=substr($0, index($0,$2))
      #       printf("{\"path\":\"%s\",\"start_line\":%s,\"end_line\":%s,\"annotation_level\":\"warning\",\"message\":\"%s - %s\"}\n",file,line,line,rule,desc)
      #     }' review.txt | jq -s '.' > annotations.json

      #     echo "Generated annotations:"
      #     cat annotations.json

      # - name: Create GitHub Check with annotations
      #   uses: actions/github-script@v7
      #   with:
      #     github-token: ${{ secrets.GITHUB_TOKEN }}
      #     script: |
      #       const fs = require('fs');

      #       const annotations = JSON.parse(fs.readFileSync('annotations.json'));

      #       const status = annotations.length > 0 ? "failure" : "success";

      #       await github.rest.checks.create({
      #         owner: context.repo.owner,
      #         repo: context.repo.repo,
      #         name: "AI Code Review",
      #         head_sha: context.payload.workflow_run.head_sha,
      #         status: "completed",
      #         conclusion: status,
      #         output: {
      #           title: "AI Code Review Results",
      #           summary: annotations.length + " findings detected",
      #           annotations: annotations.slice(0, 50)
      #         }
      #       });

      - name: Fail if AI review failed
        run: |
          if grep -q "AI_CODE_REVIEW_STATUS: FAIL" review.txt; then
            echo "❌ AI code review failed"
            exit 1
          else
            echo "✅ AI code review passed"
          fi