name: Enforce AI Code Review

on:
  workflow_run:
    workflows: [".NET Code Review Agent"]
    types:
      - completed

permissions:
  actions: read
  contents: read
  pull-requests: write

jobs:
  enforce:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install GitHub CLI
        run: |
          sudo apt update
          sudo apt install gh -y

      - name: Authenticate GitHub CLI
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh auth status

      - name: Download agent artifacts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Downloading artifacts from run ${{ github.event.workflow_run.id }}"
          gh run download ${{ github.event.workflow_run.id }}

      - name: Locate AI report
        id: find_report
        run: |
          REPORT_FILE=$(grep -rl "AI CODE REVIEW REPORT START" . | head -n 1)

          if [ -z "$REPORT_FILE" ]; then
            echo "report_found=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "report_found=true" >> $GITHUB_OUTPUT
          echo "report_file=$REPORT_FILE" >> $GITHUB_OUTPUT

      - name: Extract AI review report
        id: extract
        if: steps.find_report.outputs.report_found == 'true'
        run: |
          awk '/AI CODE REVIEW REPORT START/,/AI CODE REVIEW REPORT END/' \
          "${{ steps.find_report.outputs.report_file }}" > review.txt

          echo "report<<EOF" >> $GITHUB_OUTPUT
          cat review.txt >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Get PR number
        id: pr
        run: |
          PR_NUMBER=$(jq -r '.workflow_run.pull_requests[0].number // empty' "$GITHUB_EVENT_PATH")
          echo "pr=$PR_NUMBER" >> $GITHUB_OUTPUT

      - name: Comment report on PR
        if: steps.pr.outputs.pr != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "## 🤖 AI Code Review" > comment.md
          echo "" >> comment.md
          cat review.txt >> comment.md

          gh pr comment ${{ steps.pr.outputs.pr }} --body-file comment.md

      - name: Fail if AI review failed
        run: |
          if grep -R "AI_CODE_REVIEW_STATUS: FAIL" .; then
            echo "❌ AI code review failed"
            exit 1
          else
            echo "✅ AI code review passed"
          fi