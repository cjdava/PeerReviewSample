name: .NET Code Review

on:
  pull_request:
    paths:
      - '**/*.cs'
      - '**/*.sln'
      - '**/*.csproj'

permissions:
  contents: read
  pull-requests: write

jobs:
  code-review:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Copilot Agent
        uses: github/agentic-workflows@v1
        with:
          instructions-file: .github/workflows/code-review.md