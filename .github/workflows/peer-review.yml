name: Peer Review Agent

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Install dependencies
        run: pip install requests
      - name: Run Peer Review
        run: |
          python scripts/peer-review.py https://raw.githubusercontent.com/cjdava/best-practices/main/code-peer-review.md .